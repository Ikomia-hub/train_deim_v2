task: detection
evaluator:
  type: CocoEvaluator
  iou_types:
  - bbox
num_classes: 2
remap_mscoco_category: false
train_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: C:\Users\allan\Ikomia\Plugins\Python\train_deim_v2\dataset\train\images
    ann_file: C:\Users\allan\Ikomia\Plugins\Python\train_deim_v2\dataset\train\train_coco_annotation.json
    return_masks: false
    transforms:
      type: Compose
      ops:
      - type: Mosaic
        output_size: 320
        rotation_range: 10
        translation_range:
        - 0.1
        - 0.1
        scaling_range:
        - 0.5
        - 1.5
        probability: 1.0
        fill_value: 0
        use_cache: true
        max_cached_images: 50
        random_pop: true
      - type: RandomPhotometricDistort
        p: 0.5
      - type: RandomZoomOut
        fill: 0
      - type: RandomIoUCrop
        p: 0.8
      - type: SanitizeBoundingBoxes
        min_size: 1
      - type: RandomHorizontalFlip
      - type: Resize
        size: &id001
        - 640
        - 640
      - type: SanitizeBoundingBoxes
        min_size: 1
      - type: ConvertPILImage
        dtype: float32
        scale: true
      - type: ConvertBoxes
        fmt: cxcywh
        normalize: true
      policy:
        name: stop_epoch
        epoch:
        - 4
        - 78
        - 148
        ops:
        - Mosaic
        - RandomPhotometricDistort
        - RandomZoomOut
        - RandomIoUCrop
      mosaic_prob: 0.5
  shuffle: true
  num_workers: 0
  drop_last: true
  collate_fn:
    type: BatchImageCollateFunction
    base_size: 640
    base_size_repeat: null
    stop_epoch: 148
    mixup_prob: 0.5
    mixup_epochs:
    - 4
    - 78
    copyblend_prob: 0.4
    copyblend_epochs:
    - 4
    - 78
    area_threshold: 100
    num_objects: 3
    with_expand: true
    expand_ratios:
    - 0.1
    - 0.25
    ema_restart_decay: 0.9999
  total_batch_size: 4
val_dataloader:
  type: DataLoader
  dataset:
    type: CocoDetection
    img_folder: C:\Users\allan\Ikomia\Plugins\Python\train_deim_v2\dataset\valid\images
    ann_file: C:\Users\allan\Ikomia\Plugins\Python\train_deim_v2\dataset\valid\valid_coco_annotation.json
    return_masks: false
    transforms:
      type: Compose
      ops:
      - type: Resize
        size: *id001
      - type: ConvertPILImage
        dtype: float32
        scale: true
  shuffle: false
  num_workers: 0
  drop_last: false
  collate_fn:
    type: BatchImageCollateFunction
  total_batch_size: 4
print_freq: 500
output_dir: C:\Users\allan\Ikomia\Plugins\Python\train_deim_v2/runs/n_coco_20251105_155635
checkpoint_freq: 5
sync_bn: true
find_unused_parameters: true
use_amp: true
scaler:
  type: GradScaler
  enabled: true
use_ema: true
ema:
  type: ModelEMA
  decay: 0.9999
  warmups: 1000
  start: 0
epoches: 20
clip_max_norm: 0.1
optimizer:
  type: AdamW
  params:
  - params: ^(?=.*backbone)(?!.*norm|bn).*$
    lr: 0.0004
  - params: ^(?=.*backbone)(?=.*norm|bn).*$
    lr: 0.0004
    weight_decay: 0.0
  - params: ^(?=.*(?:encoder|decoder))(?=.*(?:norm|bn|bias)).*$
    weight_decay: 0.0
  lr: 0.00055
  betas:
  - 0.9
  - 0.999
  weight_decay: 0.000125
lr_scheduler:
  type: MultiStepLR
  milestones:
  - 500
  gamma: 0.1
lr_warmup_scheduler:
  type: LinearWarmup
  warmup_duration: 500
model: DEIM
criterion: DEIMCriterion
postprocessor: PostProcessor
use_focal_loss: true
eval_spatial_size: *id001
DEIM:
  backbone: HGNetv2
  encoder: HybridEncoder
  decoder: DEIMTransformer
HGNetv2:
  name: B0
  return_idx:
  - 2
  - 3
  freeze_at: -1
  freeze_stem_only: true
  freeze_norm: false
  pretrained: true
  local_model_dir: ./weight/hgnetv2/
  use_lab: true
HybridEncoder:
  in_channels:
  - 512
  - 1024
  feat_strides:
  - 16
  - 32
  hidden_dim: 128
  use_encoder_idx:
  - 1
  num_encoder_layers: 1
  nhead: 8
  dim_feedforward: 512
  dropout: 0.0
  enc_act: gelu
  expansion: 0.34
  depth_mult: 0.5
  act: silu
  version: dfine
  csp_type: csp2
  fuse_op: sum
DEIMTransformer:
  feat_channels:
  - 128
  - 128
  feat_strides:
  - 16
  - 32
  hidden_dim: 128
  num_levels: 2
  num_layers: 3
  eval_idx: -1
  num_queries: 300
  num_denoising: 100
  label_noise_ratio: 0.5
  box_noise_scale: 1.0
  reg_max: 32
  reg_scale: 4
  layer_scale: 1
  num_points:
  - 6
  - 6
  cross_attn_method: default
  query_select_method: default
  activation: silu
  mlp_act: silu
  dim_feedforward: 512
PostProcessor:
  num_top_queries: 300
lrsheduler: flatcosine
lr_gamma: 1.0
warmup_iter: 2000
flat_epoch: 7800
no_aug_epoch: 12
DEIMCriterion:
  weight_dict:
    loss_mal: 1
    loss_bbox: 5
    loss_giou: 2
    loss_fgl: 0.15
    loss_ddf: 1.5
  losses:
  - mal
  - boxes
  - local
  gamma: 1.5
  alpha: 0.75
  reg_max: 32
  matcher:
    type: HungarianMatcher
    weight_dict:
      cost_class: 2
      cost_bbox: 5
      cost_giou: 2
    alpha: 0.25
    gamma: 2.0
    change_matcher: true
    iou_order_alpha: 4.0
    matcher_change_epoch: 136
__include__:
- ../dataset/coco_detection.yml
- ../runtime.yml
- ../base/dataloader.yml
- ../base/optimizer.yml
- ../base/deimv2.yml
tuning: C:\Users\allan\Ikomia\Plugins\Python\train_deim_v2\weights\deimv2_hgnetv2_n_coco.pth
num_classes_finetuned: 2
class_names:
- plate
- license
model_name: n_coco
